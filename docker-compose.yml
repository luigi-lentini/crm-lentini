version: '3.8'\n\nservices:\n  postgres:\n    image: postgres:latest\n    environment:\n      POSTGRES_DB: mydatabase\n      POSTGRES_USER: user\n      POSTGRES_PASSWORD: password\n    volumes:\n      - pg_data:/var/lib/postgresql/data\n    ports:\n      - "5432:5432"\n\n  backend:\n    build:\n      context: ./backend\n    environment:\n      DATABASE_URL: postgres://user:password@postgres/mydatabase\n    depends_on:\n      - postgres\n    ports:\n      - "5000:5000"\n\n  frontend:\n    build:\n      context: ./frontend\n    ports:\n      - "3000:3000"\n\nvolumes:\n  pg_data: